name: CI Pipeline HTML Flexible

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: docker build -t hello-html .

    - name: Run Docker container
      run: |
        docker run -d --name hello-test -p 8080:80 hello-html
        sleep 5

    - name: Test server is running
      run: |
        RESPONSE=$(curl -s http://localhost:8080)
        if [ -z "$RESPONSE" ]; then
          echo "Test failed: Container returned nothing!"
          exit 1
        else
          echo "Test passed! Content found:"
          echo "$RESPONSE"
        fi

    - name: Stop Docker container
      run: docker stop hello-test
